<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | HEKONE</title>
  <meta name="description" content="Contact HEKONE for pilot opportunities, partnerships, technical collaboration, and strategic conversations." />

  <style>
    :root {
      --bg: #07111f;
      --text: #ecf3ff;
      --muted: #a7b7d6;
      --blue: #7cc7ff;
      --violet: #9a7cff;
    }

    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, sans-serif; background:#07111f; color:var(--text);} 

    header {
      position: sticky;
      top: 0;
      backdrop-filter: blur(14px);
      background: rgba(4,8,22,0.72);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      z-index: 10;
    }

    .nav {
      display:flex; justify-content:space-between; align-items:center;
      padding:16px 24px;
    }

    .brand { display:flex; gap:10px; font-weight:800; letter-spacing:0.1em; }

    .brand-dot {
      width:12px;height:12px;border-radius:50%;
      background:linear-gradient(135deg,var(--blue),var(--violet));
    }

    .nav-links { display:flex; gap:10px; align-items:center; }

    .nav-links a {
      padding:10px 12px;
      border-radius:12px;
      color:var(--muted);
    }

    .nav-links a:hover { color:var(--text); background:rgba(255,255,255,0.05);} 

    .nav-links a.active { color:var(--text); background:rgba(255,255,255,0.08);} 

    .nav-pilot {
      padding:10px 18px;
      border-radius:999px;
      font-weight:800;
      color:#07111a !important;
      background:linear-gradient(90deg,#7dc7ff,#a78bfa);
    }

    main { padding:60px 24px; max-width:1100px; margin:auto; }

    h1 { font-size:42px; }
  </style>
</head>
<body>

<header>
  <div class="nav">
    <a class="brand" href="/">
      <span class="brand-dot"></span>
      HEKONE
    </a>

    <nav class="nav-links">
      <a href="/instrumentation-example.html">Technology</a>
      <a href="/#problem">Problem</a>
      <a href="/#deployment">Deployment</a>
      <a href="/#solution">Solution</a>
      <a href="/#use-cases">Use Cases</a>
      <a href="/about.html">About</a>
      <a href="/contact.html" class="active">Contact</a>
      <a href="mailto:info@hekone.com" class="nav-pilot">Explore a Pilot</a>
    </nav>
  </div>
</header>

<main>
  <h1>Contact HEKONE</h1>
  <p>Reach out for pilots, partnerships, or collaboration.</p>
</main>

</body>
</html>
