<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hekone Cloud — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  body {
    background: #0d1117;
    color: #dcdcdc;
    font-family: "Segoe UI", sans-serif;
    text-align: center;
    padding: 30px;
  }
  h1 { color: #58a6ff; }
  .hidden { display: none; }
  input {
    width: 250px; padding: 10px; margin: 6px;
    background: #161b22; border: 1px solid #333; color: #fff; border-radius: 6px;
  }
  button {
    background: #00c853; color: white; padding: 10px 20px;
    border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
  }
  button:hover { background: #009944; }
  #logoutBtn {
    background: #ff5252; margin-left: 15px;
  }
  select {
    background: #161b22; color: #fff; padding: 8px; border-radius: 6px; border: none;
  }
  .stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    flex-wrap: wrap;
    margin-top: 1rem;
  }
  .stat-box {
    background: #161b22;
    padding: 15px 25px;
    border-radius: 10px;
    font-size: 1.2rem;
  }
  canvas {
    margin-top: 20px;
    background: #161b22;
    border-radius: 10px;
    padding: 10px;
  }
  .footer {
    margin-top: 30px;
    color: #666;
    font-size: 0.9em;
  }
</style>
</head>
<body>

<h1>☁ Hekone Cloud — Live Temperature & Humidity</h1>

<!-- Login Section -->
<div id="loginSection">
  <h2>🔐 Login</h2>
  <input id="email" type="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button id="loginBtn">Login</button>
  <p id="loginStatus"></p>
</div>

<!-- Dashboard -->
<div id="dashboardSection" class="hidden">
  <div style="margin-bottom: 15px;">
    <select id="timeRange">
      <option value="1h">Last 1 Hour</option>
      <option value="24h">Last 24 Hours</option>
      <option value="7d">Last 7 Days</option>
      <option value="30d">Last 30 Days</option>
    </select>
    <button id="refreshBtn">Refresh</button>
    <button id="exportBtn">⬇️ Export CSV</button>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="stats">
    <div class="stat-box">🌡 Avg Temp: <span id="avgTemp">--</span> °C</div>
    <div class="stat-box">💧 Avg Humidity: <span id="avgHum">--</span> %</div>
  </div>

  <canvas id="chart" width="800" height="400"></canvas>

  <div class="footer">
    Powered by Supabase • ESP32 • Hekone Cloud © 2025
  </div>
</div>

<script>
const SUPABASE_URL = "https://wcfdnqshivodcyxqkdnw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjZmRucXNoaXZvZGN5eHFrZG53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE5NDQzMjUsImV4cCI6MjA3NzUyMDMyNX0.JXrECswvuMhG9CAt-5-9Y-QrKC8AI61UiwtMkRr0AeA"; // 👈 جایگزین کن
const DEVICE_ID = "fb7a2102-eccd-4f3c-baf0-aeae52da2cbd"; // 👈 جایگزین با دستگاه خودت
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let chart;

// ---- Login ----
document.getElementById("loginBtn").onclick = async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const status = document.getElementById("loginStatus");
  status.textContent = "⏳ Logging in...";

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) { status.textContent = "❌ " + error.message; return; }

  status.textContent = "✅ Login successful!";
  showDashboard();
};

// ---- Logout ----
document.getElementById("logoutBtn").onclick = async () => {
  await supabase.auth.signOut();
  document.getElementById("dashboardSection").classList.add("hidden");
  document.getElementById("loginSection").classList.remove("hidden");
};

// ---- Check if already logged in ----
(async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) showDashboard(); // اگر سشن هست، مستقیم وارد داشبورد شو
})();

// ---- Show Dashboard ----
function showDashboard() {
  document.getElementById("loginSection").classList.add("hidden");
  document.getElementById("dashboardSection").classList.remove("hidden");
  loadData("1h");
}

// ---- Load and Draw Chart ----
async function loadData(range) {
  const now = new Date();
  let since;
  switch (range) {
    case "1h": since = new Date(now - 3600 * 1000); break;
    case "24h": since = new Date(now - 24 * 3600 * 1000); break;
    case "7d": since = new Date(now - 7 * 24 * 3600 * 1000); break;
    case "30d": since = new Date(now - 30 * 24 * 3600 * 1000); break;
  }

  const { data, error } = await supabase
    .from("readings")
    .select("created_at, temperature, humidity")
    .eq("device_id", DEVICE_ID)
    .gte("created_at", since.toISOString())
    .order("created_at", { ascending: true });

  if (error) {
    alert("⚠️ Error loading data: " + error.message);
    console.error(error);
    return;
  }

  const avgTemp = data.reduce((a, b) => a + b.temperature, 0) / data.length;
  const avgHum = data.reduce((a, b) => a + b.humidity, 0) / data.length;
  document.getElementById("avgTemp").textContent = avgTemp.toFixed(1);
  document.getElementById("avgHum").textContent = avgHum.toFixed(1);

  const labels = data.map(d => new Date(d.created_at).toLocaleString());
  const temps = data.map(d => d.temperature);
  const hums = data.map(d => d.humidity);

  if (chart) chart.destroy();
  const ctx = document.getElementById("chart").getContext("2d");
  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: "Temperature (°C)",
          data: temps,
          borderColor: "#ff6384",
          backgroundColor: "rgba(255,99,132,0.1)",
          borderWidth: 2,
          tension: 0.3
        },
        {
          label: "Humidity (%)",
          data: hums,
          borderColor: "#36a2eb",
          backgroundColor: "rgba(54,162,235,0.1)",
          borderWidth: 2,
          tension: 0.3
        }
      ]
    },
    options: {
      responsive: true,
      scales: {
        x: { ticks: { color: "#aaa" } },
        y: { ticks: { color: "#aaa" }, beginAtZero: false }
      },
      plugins: { legend: { labels: { color: "#ccc" } } }
    }
  });

  document.getElementById("exportBtn").onclick = () => exportCSV(data);
}

// ---- Export CSV ----
function exportCSV(data) {
  const header = "Timestamp,Temperature,Humidity\n";
  const rows = data.map(d =>
    `${new Date(d.created_at).toLocaleString()},${d.temperature},${d.humidity}`
  ).join("\n");
  const blob = new Blob([header + rows], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "hekone_data.csv";
  a.click();
  URL.revokeObjectURL(url);
}

// ---- Buttons ----
document.getElementById("refreshBtn").onclick = () => {
  const range = document.getElementById("timeRange").value;
  loadData(range);
};
</script>
</body>
</html>
