<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HEKONE Origin Locations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="location.css?v=200" />
</head>

<body>
  <div class="location-app">

    <aside class="location-sidebar">
      <div class="brand-row">
        <div class="logo-mark">H</div>
        <div class="brand-text">
          <strong>HEKONE</strong>
          <span>Origin</span>
        </div>
      </div>

      <div class="sidebar-title">
        <div class="wifi-icon">⌁</div>
        <h1>Live Harvest Map</h1>
        <p>Real-time bin weights across the orchard.</p>
      </div>

      <div class="stats-card">
        <div>
          <span>Total Bins</span>
          <strong id="totalBins">0</strong>
        </div>
        <div>
          <span>Total Weight</span>
          <strong id="totalWeight">0.00 lb</strong>
        </div>
        <div>
          <span>Farm Average</span>
          <strong id="farmAverage">0.00 lb</strong>
        </div>
        <div>
          <span>Top Performer</span>
          <strong id="topPerformer" class="green">—</strong>
        </div>
        <div>
          <span>Needs Attention</span>
          <strong id="needsAttention" class="red">0 Bins</strong>
        </div>
        <div>
          <span>Last Update</span>
          <strong id="lastUpdateSmall" class="small-live">● Loading...</strong>
        </div>
      </div>

      <div class="performance-head">
        <strong>BIN PERFORMANCE</strong>
        <select id="sortSelect">
          <option value="high">Weight: High to Low</option>
          <option value="low">Weight: Low to High</option>
        </select>
      </div>

      <div id="binPerformanceList" class="bin-performance-list"></div>

      <a href="origin-dashboard.html" class="dashboard-link">
        View Full Dashboard ↗
      </a>
    </aside>

    <main class="map-area">

      <header class="map-topbar">
        <div class="field-selector">
          Orchard A - Block 12
          <span>⌄</span>
        </div>

        <div class="live-pill">● LIVE</div>

        <div class="topbar-spacer"></div>

        <div id="lastUpdated" class="date-text">Loading...</div>
        <div class="bell">♧</div>
        <div class="avatar">JD</div>
      </header>

      <div class="filter-row">
        <button class="filter-btn active">All Bins <span id="allBinsCount">(0)</span></button>
        <button class="filter-btn high">● High</button>
        <button class="filter-btn average">● Average</button>
        <button class="filter-btn low">● Low</button>
      </div>

      <div class="map-stage">
        <iframe
          id="satelliteMap"
          class="satellite-map"
          loading="lazy"
          allowfullscreen
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>

        <div id="mapMarkers" class="map-markers"></div>

        <div class="zoom-control">
          <button>+</button>
          <button>−</button>
        </div>

        <div class="scale-box">50 ft</div>
      </div>

    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://anfhobbenrpvppzsaszr.supabase.co";
    const supabaseKey = "sb_publishable_jf6yF7FU5wLGGSAjK7emxw_i5qFEuFW";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
  </script>

  <script src="location.js?v=200"></script>
</body>
</html>
